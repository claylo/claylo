name: Trigger Deploy

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger claylo/dev build
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEV_REPO_PAT }}" \
            https://api.github.com/repos/claylo/dev/dispatches \
            -d '{"event_type":"blog-release"}'
